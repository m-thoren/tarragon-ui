<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" type="text/css" href="../../dist/tarragon-ui.css" />
	</head>
	<body class="light">
		<main class="container">
			<h1>Button - variants</h1>

			<h2>Default</h2>
			<div class="cluster">
				<button>Default</button>
				<button class="accent">Accent</button>
				<button class="info">Info</button>
				<button class="warning">Warning</button>
				<button class="success">Success</button>
				<button class="danger">Danger</button>
				<button class="size-icon">
					<SaveIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
				<button class="size-icon danger">
					<TrashIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
			</div>

			<h2>Outline</h2>
			<div class="cluster">
				<button class="outline">Default</button>
				<button class="outline accent">Accent</button>
				<button class="outline info">Info</button>
				<button class="outline warning">Warning</button>
				<button class="outline success">Success</button>
				<button class="outline danger">Danger</button>
				<button class="size-icon outline success">
					<SaveIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
				<button class="size-icon outline danger">
					<TrashIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
			</div>

			<h2>Ghost</h2>
			<div class="cluster">
				<button class="ghost">Default</button>
				<button class="ghost accent">Accent</button>
				<button class="ghost info">Info</button>
				<button class="ghost warning">Warning</button>
				<button class="ghost success">Success</button>
				<button class="ghost danger">Danger</button>
				<button class="size-icon ghost success">
					<SaveIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
				<button class="size-icon ghost danger">
					<TrashIcon aria-hidden="true" />
					<span class="visually-hidden">Icon button</span>
				</button>
			</div>

			<h2>Link</h2>
			<div class="cluster">
				<a href="#test" class="btn">Link</a>
				<a href="#test" class="btn outline">Link</a>
				<a href="#test" class="btn ghost">Link</a>
			</div>
		</main>
	</body>
</html>
